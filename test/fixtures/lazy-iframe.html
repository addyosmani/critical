<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lazy Loading Iframes Test</title>
    <link rel="stylesheet" href="styles/lazy-iframe.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Lazy Loading Iframes</h1>
    </header>

    <div class="content">
      <p>This page tests that critical CSS generation does not time out when lazy loaded iframes are present.</p>

      <div class="video-container">
        <iframe
          src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ"
          loading="lazy"
          title="Lazy loaded video"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
        ></iframe>
      </div>

      <div class="map-container">
        <iframe
          src="https://www.openstreetmap.org/export/embed.html"
          loading="lazy"
          title="Lazy loaded map"
        ></iframe>
      </div>

      <p>Content below the iframes should still be reachable.</p>
    </div>

    <div class="below-fold">
      <p>This content is below the fold.</p>
    </div>
  </body>
</html>
